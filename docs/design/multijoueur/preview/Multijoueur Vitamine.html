<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TriviaQuiz — Mode multijoueur (Vitamine)</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../reference/tokens.js"></script>
<script type="text/babel" src="../reference/atoms.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="../reference/screens-multi.jsx"></script>
<script type="text/babel" src="../reference/screens-game.jsx"></script>

<script type="text/babel" data-presets="react">
const MJ = window.MJ;
function App() {
  return (
    <DesignCanvas>
      <DCSection id="multi" title="Mode multijoueur · Vitamine"
        subtitle="Les 7 écrans restylés. Le jeu reprend la présentation du mode solo (carte question + réponses lettrées) avec le panneau de scores en bas. Résultats festifs sur fond nuit.">
        <DCArtboard id="s1" label="1 · Lancement" width={412} height={892}><MJ.MultiLaunch /></DCArtboard>
        <DCArtboard id="s2" label="2 · Créer une partie" width={412} height={1240}><MJ.MultiCreate /></DCArtboard>
        <DCArtboard id="s3" label="3 · Salon (code à partager)" width={412} height={892}><MJ.MultiLobby /></DCArtboard>
        <DCArtboard id="s4" label="4 · Question" width={412} height={940}><MJ.MultiGameQuestion /></DCArtboard>
        <DCArtboard id="s5" label="5 · Réponse fausse" width={412} height={1010}><MJ.MultiGameWrong /></DCArtboard>
        <DCArtboard id="s6" label="6 · Réponse bonne" width={412} height={1010}><MJ.MultiGameCorrect /></DCArtboard>
        <DCArtboard id="s7" label="7 · Résultats" width={412} height={940}><MJ.MultiResults /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
