<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TriviaQuiz — Écrans Compte (8 · 9)</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- tokens (plain JS, avant babel) -->
<script src="../reference/tokens.js"></script>

<!-- frames + canvas + atomes + écrans (babel) -->
<script type="text/babel" src="frames/android-frame.jsx"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="../reference/atoms.jsx"></script>
<script type="text/babel" src="../reference/screens-e.jsx"></script>

<script type="text/babel" data-presets="react">
function Phone({ children, dark }) {
  return (
    <AndroidDevice width={412} height={892} dark={dark}>
      {children}
    </AndroidDevice>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="compte" title="Compte" subtitle="Écran Compte (AccountScreen). États déconnecté/invité fusionnés en un seul écran connexion/inscription ; le pseudo (nom affiché en multijoueur) est prévu, pré-rempli depuis l'email.">
        <DCArtboard id="acct-auth" label="8 · Connexion / inscription" width={412} height={892}><Phone><AccountAuthScreen /></Phone></DCArtboard>
        <DCArtboard id="acct-in" label="9 · Mon compte (connecté)" width={412} height={892}><Phone><AccountSignedInScreen /></Phone></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
